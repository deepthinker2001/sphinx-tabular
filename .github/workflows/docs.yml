name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify documentation installation
        run: |
          python - <<'PY'
          import sphinx_book_theme
          import sphinx_design
          import sphinx_tabular
          import sphinx_tabular.rlist

          print("Book theme:", sphinx_book_theme.__file__)
          print("Sphinx Design:", sphinx_design.__file__)
          print("Sphinx Tabular:", sphinx_tabular.__file__)
          print("RList:", sphinx_tabular.rlist.__file__)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build documentation
        run: |
          rm -rf docs/_build
          sphinx-build \
            -b html \
            -W \
            --keep-going \
            docs/source \
            docs/_build/html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5