name: Documentation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify rlist-table installation
        run: |
          echo "Repository files:"
          ls -la src/sphinx_tabular

          python - <<'PY'
          import sphinx_tabular
          import sphinx_tabular.rlist

          print("Loaded package from:", sphinx_tabular.__file__)
          print("Loaded rlist from:", sphinx_tabular.rlist.__file__)
          PY

      - name: Build documentation
        run: |
          rm -rf docs/_build
          sphinx-build \
            -b html \
            -W \
            --keep-going \
            docs/source \
            docs/_build/html