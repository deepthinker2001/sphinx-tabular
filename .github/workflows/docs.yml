name: Documentation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify local extension
        run: |
          python - <<'PY'
          import inspect
          import sphinx_tabular
          from sphinx_tabular.rlist import RListTableDirective

          print("Loaded from:", sphinx_tabular.__file__)
          print("Directive class:", RListTableDirective)
          print(
              "Registered:",
              'app.add_directive("rlist-table"' in
              inspect.getsource(sphinx_tabular.setup),
          )
          PY

      - name: Build documentation
        run: |
          rm -rf docs/_build
          sphinx-build \
            -b html \
            -W \
            --keep-going \
            docs/source \
            docs/_build/html